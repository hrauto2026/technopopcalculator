<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <meta name="apple-mobile-web-app-title" content="RS-2026A">

    <title>Technopop Synth-Calc RS-2026A</title>
    
    <style>
        :root {
            --bg-color: #121212;
            --case-bg: #d4d4d2;
            --lcd-bg: #a3ad91;
            --lcd-text: #1d1f1a;
            --btn-num: #ffffff;
            --btn-op: #e8e8e6;
            --btn-special: #444;
            --btn-font-color: #333;
            --model-color: #555;
            --accent-orange: #ff6600;
            --mode-btn-bg: #ffffcc; 
            --shocking-green: #39FF14;
        }

        [data-theme="city-pop"] {
            --case-bg: #ff007f;
            --lcd-bg: #00ffff;
            --lcd-text: #000;
            --btn-num: #ffff00;
            --btn-op: #ff77bc;
            --btn-special: #2b0035;
            --btn-font-color: #000;
            --model-color: #ffffff;
            --accent-orange: #ffffff;
        }

        [data-theme="stealth"] {
            --case-bg: #1a1a1a;
            --lcd-bg: #1a0000;
            --lcd-text: #ff0000;
            --btn-num: #333;
            --btn-op: #222;
            --btn-special: #000;
            --btn-font-color: #ff3333; 
            --model-color: #ff0000; 
            --accent-orange: #ff0000;
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
        }

        body {
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            /* Prevents iOS "rubber-banding" scroll effect */
            overflow: hidden; 
            position: fixed;
            width: 100%;
            height: 100%;
        }

        #viewport {
            width: 100%;
            max-width: 400px;
            height: 100%;
            max-height: 850px;
            background: var(--case-bg);
            /* Adds rounded corners only if not in standalone mode, or use safe-areas */
            border-radius: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
            padding: calc(20px + env(safe-area-inset-top)) 24px calc(20px + env(safe-area-inset-bottom)) 24px;
            display: flex;
            flex-direction: column;
            position: relative;
            border: 4px solid #333;
        }

        /* All other styles remain the same from previous fix */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .header-label { font-weight: bold; color: var(--accent-orange); font-size: 14px; text-transform: uppercase; }
        .model-number { font-family: Arial, sans-serif; font-weight: bold; color: var(--model-color); font-size: 14px; }
        #lcd-container { background-color: var(--lcd-bg); height: 100px; border: 5px solid #333; border-radius: 12px; margin-bottom: 30px; display: flex; flex-direction: column; justify-content: center; padding: 0 15px; box-shadow: inset 3px 3px 10px rgba(0,0,0,0.4); position: relative; overflow: hidden; }
        #lcd-main { text-align: right; font-family: 'Courier New', monospace; font-size: 32px; font-weight: bold; color: var(--lcd-text); white-space: nowrap; }
        .util-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 25px; }
        .main-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; flex-grow: 1; }
        
        button {
            border: none; border-radius: 12px; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 5px #999; transition: all 0.05s; position: relative; user-select: none;
            touch-action: manipulation; /* Prevents double-tap zoom */
        }
        button:active:not(:disabled) { box-shadow: 0 1px #999; transform: translateY(4px); }
        .btn-text { font-size: 24px; font-weight: bold; color: var(--btn-font-color); }
        .solfege { font-size: 13px; text-transform: lowercase; margin-top: 2px; color: var(--btn-font-color); font-weight: bold; opacity: 0.7; }
        .btn-util { background: var(--btn-special); color: white; height: 50px; font-size: 10px; font-weight: bold; }
        .btn-num { background: var(--btn-num); height: 100%; }
        .btn-op { background: var(--btn-op); height: 100%; }
        .footer { margin-top: 20px; padding-bottom: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn-footer { height: 50px; color: white; font-weight: bold; border-radius: 15px; font-size: 11px; background: #333; }
        
        /* Modal and Sparkle Styles... */
        .sparkle-active { background: var(--shocking-green) !important; transform: scale(1.1); z-index: 10; }
        .modal { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 100; padding: 40px 25px; color: white; flex-direction: column; }
    </style>
</head>
<body>

    <div id="viewport">
        <div class="header">
            <div class="header-label">Technopop Approved</div>
            <div class="model-number">RS-2026A</div>
        </div>

        <div id="lcd-container">
            <div id="lcd-main">READY</div>
        </div>

        <div class="util-grid">
            <button class="btn-util" onclick="toggleMode()" id="mode-btn">CALC</button>
            <button class="btn-util" onclick="toggleRecord()" id="rec-btn">REC</button>
            <button class="btn-util" onclick="playSequence()" id="play-btn">PLAY</button>
            <button class="btn-util" onclick="toggleTheme()">THEME</button>
        </div>

        <div class="main-grid">
            <button class="btn-num" onclick="handleInput('1')"><span class="btn-text">1</span><span class="solfege">do</span></button>
            <button class="btn-num" onclick="handleInput('2')"><span class="btn-text">2</span><span class="solfege">re</span></button>
            <button class="btn-num" onclick="handleInput('3')"><span class="btn-text">3</span><span class="solfege">mi</span></button>
            <button class="btn-op" onclick="handleInput('+')"><span class="btn-text">+</span><span class="solfege">la²</span></button>
            </div>

        <div class="footer">
            <button class="btn-footer" onclick="alert('Manual logic here')">MANUAL</button>
            <button class="btn-footer" style="background:#bbb; color:#333" onclick="playSpecial()">SPECIAL KEY</button>
        </div>
    </div>

    <script>
        // Use your existing JavaScript logic here.
        // The App-like behavior is handled by the <meta> tags above.
        
        // TIP: To prevent the "bounce" effect when you pull down on the app:
        document.addEventListener('touchmove', function(e) {
            e.preventDefault();
        }, { passive: false });
    </script>
</body>
</html>
