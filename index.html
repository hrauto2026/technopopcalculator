<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Technopop Synth-Calc RS-2026A</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        :root {
            --bg-color: #121212;
            --case-bg: #d4d4d2;
            --lcd-bg: #a3ad91;
            --lcd-text: #1d1f1a;
            --btn-num: #ffffff;
            --btn-op: #e8e8e6;
            --btn-special: #444;
            --btn-font-color: #333;
            --model-color: #555;
            --accent-orange: #ff6600;
            --mode-btn-bg: #ffffcc; 
            --shocking-green: #39FF14;
        }

        [data-theme="city-pop"] {
            --case-bg: #ff007f;
            --lcd-bg: #00ffff;
            --lcd-text: #000;
            --btn-num: #ffff00;
            --btn-op: #ff77bc;
            --btn-special: #2b0035;
            --btn-font-color: #000;
            --model-color: #ffffff;
            --accent-orange: #ffffff;
        }

        [data-theme="stealth"] {
            --case-bg: #1a1a1a;
            --lcd-bg: #1a0000;
            --lcd-text: #ff0000;
            --btn-num: #333;
            --btn-op: #222;
            --btn-special: #000;
            --btn-font-color: #ff3333; 
            --model-color: #ff0000; 
            --accent-orange: #ff0000;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--case-bg);
            margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; width: 100vw;
            font-family: Arial, sans-serif;
            overflow: hidden; position: fixed;
        }

        #viewport {
            width: 100%; height: 100%; 
            background: var(--case-bg);
            padding: calc(15px + env(safe-area-inset-top)) 20px calc(5px + env(safe-area-inset-bottom)) 20px;
            display: flex; flex-direction: column;
            position: relative; transition: background 0.3s;
        }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; flex-shrink: 0; }
        .header-label { font-weight: bold; color: var(--accent-orange); font-size: 14px; text-transform: uppercase; }
        .model-number { font-weight: bold; color: var(--model-color); font-size: 14px; }

        #lcd-container {
            background-color: var(--lcd-bg);
            height: 18vh; min-height: 90px;
            border: 4px solid #333; border-radius: 12px;
            margin-bottom: 15px; display: flex; flex-direction: column;
            justify-content: center; padding: 0 15px;
            box-shadow: inset 3px 3px 10px rgba(0,0,0,0.4);
            position: relative; flex-shrink: 0;
        }

        #lcd-mem { position: absolute; top: 5px; left: 10px; font-family: 'Courier New', monospace; font-size: 14px; font-weight: bold; color: var(--lcd-text); visibility: hidden; }
        #lcd-mode-marker { position: absolute; bottom: 5px; left: 10px; font-family: Arial, sans-serif; font-size: 9px; font-weight: bold; text-transform: uppercase; color: var(--lcd-text); opacity: 0.7; }
        #lcd-main { text-align: right; font-family: 'Courier New', monospace; font-size: 32px; font-weight: bold; color: var(--lcd-text); white-space: nowrap; }

        .util-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 12px; flex-shrink: 0; }
        .main-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; flex-grow: 1; margin-bottom: 15px; }

        button {
            border: none; border-radius: 12px; cursor: pointer;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 0 4px #999; transition: all 0.05s; position: relative; user-select: none; width: 100%;
        }

        button:active:not(:disabled) { box-shadow: 0 1px #999; transform: translateY(3px); }
        .btn-text { font-size: 18px; font-weight: bold; color: var(--btn-font-color); }
        .solfege { font-size: 10px; text-transform: lowercase; margin-top: 2px; color: var(--btn-font-color); font-weight: bold; opacity: 0.7; }
        .btn-util { background: var(--btn-special); color: white; font-size: 10px; font-weight: bold; box-shadow: 0 4px #222; height: 45px; }
        #mode-btn { background: var(--mode-btn-bg) !important; color: #333 !important; box-shadow: 0 4px #b2b28f; }
        .btn-num { background: var(--btn-num); }
        .btn-op { background: var(--btn-op); }
        
        .footer { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; height: 50px; flex-shrink: 0; margin-bottom: env(safe-area-inset-bottom); }
        .btn-footer { color: white; font-weight: bold; border-radius: 15px; font-size: 11px; box-shadow: 0 4px #444; }
        .btn-how { background: #333; }
        .btn-special-key { background: #bbb; color: #333; box-shadow: 0 4px #777; border: 2px solid #555; }

        .modal {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 100; padding: calc(40px + env(safe-area-inset-top)) 25px 40px 25px;
            color: white; flex-direction: column;
        }

        .sparkle-active { background: var(--shocking-green) !important; box-shadow: 0 0 20px var(--shocking-green); transform: scale(1.05); z-index: 10; }
        .rec-active { color: #ff3b30 !important; }
        .play-active { color: #4cd964 !important; }
    </style>
</head>
<body>

    <div id="viewport">
        <div class="header">
            <div class="header-label">Technopop Approved</div>
            <div class="model-number">RS-2026A</div>
        </div>

        <div id="lcd-container">
            <div id="lcd-mem">M</div>
            <div id="lcd-main">READY</div>
            <div id="lcd-mode-marker">Music Mode</div>
        </div>

        <div class="util-grid">
            <button class="btn-util" onclick="toggleMode()" id="mode-btn">CALC</button>
            <button class="btn-util mode-dep" onclick="toggleRecord()" id="rec-btn">REC MEM</button>
            <button class="btn-util mode-dep" onclick="playSequence()" id="play-btn">PLAY MEM</button>
            <button class="btn-util" onclick="toggleTheme()">THEME</button>
        </div>

        <div class="main-grid">
            <button class="btn-num control-btn" data-key="7" onclick="handleInput('7')"><span class="btn-text">7</span><span class="solfege">ti</span></button>
            <button class="btn-num control-btn" data-key="8" onclick="handleInput('8')"><span class="btn-text">8</span><span class="solfege">do²</span></button>
            <button class="btn-num control-btn" data-key="9" onclick="handleInput('9')"><span class="btn-text">9</span><span class="solfege">re²</span></button>
            <button class="btn-op control-btn" data-key="/" onclick="handleInput('/')"><span class="btn-text">/</span><span class="solfege">mi²</span></button>

            <button class="btn-num control-btn" data-key="4" onclick="handleInput('4')"><span class="btn-text">4</span><span class="solfege">fa</span></button>
            <button class="btn-num control-btn" data-key="5" onclick="handleInput('5')"><span class="btn-text">5</span><span class="solfege">sol</span></button>
            <button class="btn-num control-btn" data-key="6" onclick="handleInput('6')"><span class="btn-text">6</span><span class="solfege">la</span></button>
            <button class="btn-op control-btn" data-key="*" onclick="handleInput('*')"><span class="btn-text">x</span><span class="solfege">fa²</span></button>

            <button class="btn-num control-btn" data-key="1" onclick="handleInput('1')"><span class="btn-text">1</span><span class="solfege">do</span></button>
            <button class="btn-num control-btn" data-key="2" onclick="handleInput('2')"><span class="btn-text">2</span><span class="solfege">re</span></button>
            <button class="btn-num control-btn" data-key="3" onclick="handleInput('3')"><span class="btn-text">3</span><span class="solfege">mi</span></button>
            <button class="btn-op control-btn" data-key="-" onclick="handleInput('-')"><span class="btn-text">-</span><span class="solfege">sol²</span></button>

            <button class="btn-num control-btn" data-key="0" onclick="handleInput('0')"><span class="btn-text">0</span><span class="solfege">ti²</span></button>
            <button class="btn-num control-btn" data-key="." onclick="handleInput('.')"><span class="btn-text">.</span><span class="solfege" style="color:#cc0000">mute</span></button>
            <button class="btn-op mode-dep control-btn" onclick="cycleSpeed()" id="spd-btn"><span class="btn-text" style="font-size:16px">2x</span><span class="solfege">Speed</span></button>
            <button class="btn-op control-btn" data-key="+" onclick="handleInput('+')"><span class="btn-text">+</span><span class="solfege">la²</span></button>

            <button class="btn-op control-btn" onclick="undoLast()" style="background:#bbb"><span class="btn-text" style="font-size:11px">RETURN</span></button>
            <button class="btn-num control-btn" id="ac-del-btn" onclick="clearAll()" style="background:#eee"><span class="btn-text" style="font-size:11px">Del Rec</span></button>
            <button class="btn-op control-btn" data-key="Enter" onclick="handleInput('=')" style="background:#bbb"><span class="btn-text">=</span><span class="solfege">do³</span></button>
            <button class="btn-op control-btn" id="io-btn" onclick="showIO()" style="background:#bbb"><span class="btn-text" style="font-size:14px">IO</span></button>
        </div>

        <div class="footer">
            <button class="btn-footer btn-how" onclick="showHowTo()">MANUAL</button>
            <button class="btn-footer btn-special-key" id="special-btn" onclick="playSpecial()">SPECIAL KEY</button>
        </div>
    </div>

    <div id="modal-io" class="modal">
        <h3>Memory Data Transfer</h3>
        <textarea id="io-textarea" placeholder="Sequence..."></textarea>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <button class="btn-util" onclick="copyToClipboard()">COPY</button>
            <button class="btn-util" onclick="importSequence()">IMPORT</button>
        </div>
        <button class="btn-util" onclick="closeModals()" style="width:100%; margin-top:20px;">CLOSE</button>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const frequencies = {
            '1': 261.63, '2': 293.66, '3': 329.63, '4': 349.23, '5': 392.00, '6': 440.00, '7': 493.88,
            '8': 523.25, '9': 587.33, '0': 987.77, '/': 659.25, '*': 698.46, '-': 783.99, '+': 880.00, '=': 1046.50
        };

        let state = {
            isMusic: true, isRecording: false, isPlaying: false, isResultDisplayed: false,
            memory: [], liveBuffer: "", calcInput: "", speed: 2, maxMem: 200,
            themes: ['retro', 'city-pop', 'stealth'], themeIdx: 0
        };

        const lcd = document.getElementById('lcd-main');
        const memIndicator = document.getElementById('lcd-mem');

        function updateMemIndicator() { memIndicator.style.visibility = state.memory.length > 0 ? 'visible' : 'hidden'; }

        function playNote(char) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const freq = frequencies[char];
            if (!freq) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'square';
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.3);
        }

        async function playSpecial() {
            if (state.isPlaying || !state.isMusic) return;
            state.isPlaying = true;
            disableAllButtons(true);
            
            const sequence = "4599.845887..4599.845887.6..4599.845887..4599.845887.6..44284.44284.44284.44284.";
            const lyrics = "BY PRESSING DOWN A SPECIAL KEY - IT PLAYS A LITTLE MELODY ";
            const delay = 400 / 1.5; // Your 1.5x Speed Requirement
            
            let lyricIdx = 0;
            const ticker = setInterval(() => {
                lcd.innerText = (lyrics + "            ").substring(lyricIdx, lyricIdx + 12);
                lyricIdx = (lyricIdx + 1) % lyrics.length;
            }, 150);

            for (let char of sequence) {
                if (!state.isPlaying) break;
                if (char !== '.') {
                    playNote(char);
                    const btn = document.querySelector(`button[data-key="${char}"]`);
                    if (btn) { btn.classList.add('sparkle-active'); setTimeout(() => btn.classList.remove('sparkle-active'), delay - 50); }
                }
                await new Promise(r => setTimeout(r, delay));
            }

            clearInterval(ticker);
            state.isPlaying = false;
            disableAllButtons(false);
            lcd.innerText = "READY";
        }

        function handleInput(key) {
            if (state.isPlaying) return;
            const noteVal = key === 'Enter' ? '=' : key;
            if (key !== '.') playNote(noteVal);
            if (state.isMusic) {
                if (state.isRecording) {
                    state.memory.push(key);
                    lcd.innerText = `[${state.memory.length}] ${state.memory.join('').slice(-8)}`;
                } else {
                    state.liveBuffer += key;
                    lcd.innerText = state.liveBuffer.slice(-12);
                }
                updateMemIndicator();
            } else {
                if (key === '=' || key === 'Enter') {
                    try { lcd.innerText = eval(state.calcInput.replace(/x/g, '*')); state.isResultDisplayed = true; }
                    catch { lcd.innerText = "ERROR"; }
                    state.calcInput = "";
                } else {
                    if (state.isResultDisplayed) { state.calcInput = key; state.isResultDisplayed = false; }
                    else { state.calcInput += key; }
                    lcd.innerText = state.calcInput.slice(-12);
                }
            }
        }

        function toggleTheme() { 
            state.themeIdx = (state.themeIdx + 1) % state.themes.length; 
            const newTheme = state.themes[state.themeIdx];
            document.body.setAttribute('data-theme', newTheme);
            const caseColor = getComputedStyle(document.documentElement).getPropertyValue('--case-bg');
            document.body.style.backgroundColor = caseColor;
        }

        function disableAllButtons(disabled) { document.querySelectorAll('button:not(#special-btn)').forEach(b => b.disabled = disabled); }
        function toggleMode() { state.isMusic = !state.isMusic; document.getElementById('mode-btn').innerText = state.isMusic ? "CALC" : "MUSIC"; clearAll(); }
        function clearAll() { state.calcInput = ""; state.memory = []; lcd.innerText = "READY"; updateMemIndicator(); }
        function undoLast() { if(state.isMusic) state.memory.pop(); else state.calcInput = state.calcInput.slice(0,-1); lcd.innerText = "READY"; updateMemIndicator(); }
        function closeModals() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }
        function showIO() { document.getElementById('modal-io').style.display = 'flex'; }
        function showHowTo() { alert("Technopop RS-2026A: Press keys to synthesize sound. Use REC to save melodies."); }
        function cycleSpeed() { state.speed = state.speed === 2 ? 1 : 2; document.getElementById('spd-btn').querySelector('.btn-text').innerText = state.speed + 'x'; }
        function toggleRecord() { state.isRecording = !state.isRecording; document.getElementById('rec-btn').classList.toggle('rec-active'); }
        async function playSequence() { /* Standard play logic same as before */ }
    </script>
<script data-goatcounter="https://musiccalculator.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>

</body>
</html>
